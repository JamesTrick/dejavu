repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyrefly
        name: pyrefly
        entry: pyrefly check dejavu
        language: system
        types: [python]
        pass_filenames: false